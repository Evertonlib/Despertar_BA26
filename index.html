<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Sistema Ritmo Certo</title>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="icon" href="icon-192.png"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="theme-color" content="#050D15"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#050D15;color:#F0F8FF;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
  #app{max-width:430px;margin:0 auto;padding-bottom:40px;}

  /* header */
  .hdr{display:flex;justify-content:space-between;align-items:center;padding:18px 18px 10px;}
  .hdr-sub{font-size:9px;letter-spacing:3px;color:#22D3EE;text-transform:uppercase;font-weight:800;}
  .hdr-desc{font-size:12px;color:#94B8D4;margin-top:3px;font-weight:500;}
  .hdr-right{text-align:right;}
  .hdr-label{font-size:9px;letter-spacing:3px;color:#3D6482;text-transform:uppercase;}
  .hdr-days{font-size:32px;font-weight:900;color:#FFD43B;line-height:1;font-family:'Courier New',monospace;}
  .hdr-days span{font-size:14px;font-weight:600;color:#FB923C;}

  /* hero */
  .hero{margin:6px 14px 14px;border-radius:16px;overflow:hidden;background:#0B1825;border:1px solid #162535;position:relative;}
  .hero-bar{height:3px;}
  .hero-body{padding:18px 18px 20px;}
  .hero-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;}
  .hero-eyebrow{font-size:9px;letter-spacing:3px;color:#22D3EE;text-transform:uppercase;font-weight:800;}
  .hero-meta{font-size:12px;color:#94B8D4;margin-top:4px;}
  .hero-meta span{color:#3D6482;}
  .hero-badge{padding:4px 11px;border-radius:6px;font-size:11px;font-weight:800;letter-spacing:.5px;}
  .hero-center{text-align:center;}
  .hero-wake-label{font-size:9px;letter-spacing:4px;color:#3D6482;text-transform:uppercase;margin-bottom:8px;}
  .hero-time{font-size:80px;font-weight:900;color:#FB923C;font-family:'Courier New',monospace;line-height:1;letter-spacing:-4px;}
  .hero-prova{font-size:28px;font-weight:900;color:#FFD43B;padding:8px 0;}
  .hero-info{display:flex;justify-content:center;gap:10px;margin-top:10px;font-size:11px;color:#94B8D4;}
  .hero-info b{color:#F0F8FF;}
  .hero-dot{color:#1C3A52;}

  /* tabs */
  .tabs{display:flex;margin:0 14px 12px;background:#0B1825;border-radius:10px;padding:3px;border:1px solid #162535;}
  .tab{flex:1;padding:8px 0;border-radius:8px;border:none;font-size:12px;cursor:pointer;transition:all .15s;}
  .tab.active{background:#163050;color:#F0F8FF;font-weight:700;}
  .tab.inactive{background:transparent;color:#3D6482;font-weight:500;}

  /* section label */
  .sec-label{font-size:9px;letter-spacing:3px;color:#22D3EE;text-transform:uppercase;margin-bottom:8px;font-weight:800;padding:0 14px;}

  /* day row */
  .day-row{display:flex;align-items:center;padding:11px 13px;margin:0 14px 5px;border-radius:10px;background:#0B1825;border:1px solid #162535;}
  .day-row.today{background:#0F2033;border-color:#1E4A70;}
  .day-row.past{opacity:.35;}
  .day-name{font-size:12px;font-weight:700;width:40px;flex-shrink:0;}
  .day-name.today{color:#F0F8FF;}
  .day-name.normal{color:#94B8D4;}
  .day-date{font-size:10px;color:#3D6482;margin-top:1px;}
  .day-bar{width:3px;height:26px;border-radius:2px;margin:0 12px;flex-shrink:0;}
  .day-tipo{font-size:12px;font-weight:600;}
  .day-tipo.off{color:#3D6482;font-weight:400;}
  .day-dur{font-size:10px;color:#3D6482;margin-top:2px;}
  .day-wake{flex-shrink:0;text-align:right;}
  .day-wake-off{font-size:11px;color:#1C3A52;}
  .day-wake-prova{font-size:12px;color:#FFD43B;font-weight:800;}
  .day-wake-time{font-size:19px;font-weight:800;color:#FB923C;font-family:'Courier New',monospace;}

  /* accordion */
  .acc-btn{width:100%;display:flex;justify-content:space-between;align-items:center;
    padding:10px 14px;border:1px solid #162535;cursor:pointer;font-size:12px;font-weight:700;}
  .acc-btn.cur{background:#0F2033;border-color:#1E4A70;color:#F0F8FF;}
  .acc-btn.nor{background:#0B1825;color:#94B8D4;}
  .acc-btn.open{border-radius:10px 10px 0 0;}
  .acc-btn.closed{border-radius:10px;}
  .acc-arrow{font-size:10px;color:#3D6482;}
  .acc-body{background:#060E17;border:1px solid #162535;border-top:none;border-radius:0 0 10px 10px;overflow:hidden;margin:0 0 6px;}
  .acc-item{display:flex;align-items:center;padding:9px 14px;}
  .acc-item.today-row{background:#0D2236;}
  .acc-item+.acc-item{border-top:1px solid #1C3A52;}
  .acc-date{font-size:11px;color:#3D6482;width:68px;flex-shrink:0;}
  .acc-tipo{font-size:11px;font-weight:600;}
  .acc-dur{font-size:10px;color:#3D6482;margin-left:7px;}
  .acc-wake{flex-shrink:0;font-size:15px;font-weight:800;color:#FB923C;font-family:'Courier New',monospace;}
  .acc-wake.prova{font-size:12px;color:#FFD43B;font-weight:800;}

  .footer{text-align:center;padding:24px 0 16px;font-size:9px;letter-spacing:3px;color:#1C3A52;text-transform:uppercase;}

  /* ciclo button / estados / erro / formulário */
  .ciclo-btn-wrap{padding:0 14px 10px;}
  .ciclo-btn{width:100%;padding:10px 0;border-radius:10px;border:1px solid #1E4A70;background:#0F2033;color:#F0F8FF;font-size:12px;font-weight:700;cursor:pointer;}
  .empty-state{margin:40px 14px;text-align:center;color:#94B8D4;}
  .empty-state p{margin-bottom:16px;font-size:13px;}
  .error-banner{margin:0 14px 10px;padding:10px 13px;border-radius:10px;background:rgba(255,77,109,.12);border:1px solid #FF4D6D;color:#FF9DAF;font-size:12px;}
  .form-overlay{position:fixed;inset:0;background:rgba(0,0,10,.6);display:flex;align-items:center;justify-content:center;z-index:10;padding:20px;}
  .form-card{background:#0B1825;border:1px solid #162535;border-radius:14px;padding:20px;max-width:380px;width:100%;}
  .form-card h3{font-size:14px;margin-bottom:14px;color:#F0F8FF;}
  .form-field{margin-bottom:12px;}
  .form-field label{display:block;font-size:11px;color:#94B8D4;margin-bottom:5px;}
  .form-field input{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #1E4A70;background:#060E17;color:#F0F8FF;font-size:13px;}
  .form-actions{display:flex;justify-content:flex-end;margin-top:16px;}
  .form-actions button{padding:9px 18px;border-radius:8px;border:none;background:#FB923C;color:#0B1825;font-weight:800;font-size:12px;cursor:pointer;}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="file-input" accept=".csv" style="display:none" onchange="onArquivoSelecionado(event)"/>

<script>
let S = [];

const horaTerminoParaMinutos = hhmm => {
  const [h,m] = (hhmm || "08:00").split(":").map(Number);
  return h*60 + m;
};

const wt = dur => {
  const baseMin = horaTerminoParaMinutos(horaTermino) - 40;
  const m = baseMin - dur;
  return `${Math.floor(m/60)}:${(m%60).toString().padStart(2,"0")}`;
};

const isOffTipo = tipo => (tipo || "").trim().toUpperCase().startsWith("OFF");

const sc = (tipo, prova) => {
  if(prova)                      return {text:"#FFD43B",bar:"#FFD43B",bg:"rgba(255,212,59,.12)"};
  if(tipo.includes("Endurance")) return {text:"#C084FC",bar:"#C084FC",bg:"rgba(192,132,252,.10)"};
  if(tipo.includes("Z5"))        return {text:"#FF4D6D",bar:"#FF4D6D",bg:"rgba(255,77,109,.10)"};
  if(tipo.includes("Z4")||tipo==="Z3/Z4"||tipo.includes("Fartlek")||tipo.includes("Z5/Z4"))
                                 return {text:"#FB923C",bar:"#FB923C",bg:"rgba(251,146,60,.10)"};
  if(tipo.includes("Z2")||tipo.includes("Z3"))
                                 return {text:"#22D3EE",bar:"#22D3EE",bg:"rgba(34,211,238,.10)"};
  return {text:"#64748B",bar:"#1E3040",bg:"transparent"};
};

const fmt = d => { const [,m,day]=d.split("-"); return `${day}/${m}`; };
const MESES = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
const fmtLonga = d => { const [y,m,day] = d.split("-").map(Number); return `${day} ${MESES[m-1]} ${y}`; };

// --- Parser de CSV (tolerante a aspas) ---
function splitCSVLine(line) {
  const fields = [];
  let cur = "";
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQuotes) {
      if (c === '"') {
        if (line[i+1] === '"') { cur += '"'; i++; }
        else { inQuotes = false; }
      } else {
        cur += c;
      }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { fields.push(cur); cur = ""; }
      else { cur += c; }
    }
  }
  fields.push(cur);
  return fields;
}

function parseCSVText(text) {
  const lines = text.split("\n").map(l => l.replace(/\r$/, "")).filter(l => l.trim() !== "");
  if (lines.length === 0) return { header: [], rows: [] };
  const header = splitCSVLine(lines[0]).map(h => h.trim());
  const rows = lines.slice(1).map(l => splitCSVLine(l));
  return { header, rows };
}

const REQUIRED_COLS = ["data","dia","tipo","tempo"];

function parseDateBR(s) {
  const m = /^(\d{1,2})\/(\d{1,2})\/(\d{2})$/.exec((s||"").trim());
  if (!m) return null;
  const day = parseInt(m[1],10), month = parseInt(m[2],10), year = 2000+parseInt(m[3],10);
  if (day<1 || day>31 || month<1 || month>12) return null;
  return `${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}

function buildRecords(header, rows) {
  const idx = {};
  header.forEach((h,i) => { idx[h] = i; });
  const missingColumns = REQUIRED_COLS.filter(c => !(c in idx));
  if (missingColumns.length) return { records: [], missingColumns };

  const records = [];
  rows.forEach(cols => {
    const date = parseDateBR(cols[idx.data]);
    if (!date) return; // CA-13: linha com data inválida é descartada

    const dia  = (cols[idx.dia]  || "").trim();
    const tipo = (cols[idx.tipo] || "").trim();
    const treino = idx.treino !== undefined ? (cols[idx.treino] || "").trim() : "";
    const parsedDur = parseInt(cols[idx.tempo], 10);
    const dur = Number.isFinite(parsedDur) ? parsedDur : null; // CA-14

    const rpeRaw = idx.rpe !== undefined ? cols[idx.rpe] : undefined;
    const rpe = (rpeRaw !== undefined && rpeRaw !== "") ? rpeRaw : undefined;

    const prova = tipo.toUpperCase().includes("PROVA") || treino.toUpperCase().includes("PROVA");

    const rec = { date, dia, tipo, dur, rpe };
    if (prova) rec.prova = true;
    records.push(rec);
  });

  return { records, missingColumns: [] };
}

function deriveWeeksAndTarget(records) {
  const sorted = [...records].sort((a,b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
  if (sorted.length === 0) return { records: sorted, dataAlvo: null };

  const firstMs = new Date(sorted[0].date + "T00:00:00Z").getTime();
  sorted.forEach(r => {
    const ms = new Date(r.date + "T00:00:00Z").getTime();
    r.w = Math.floor((ms - firstMs) / 86400000 / 7) + 1;
  });

  const provas = sorted.filter(r => r.prova);
  const dataAlvo = provas.length ? provas[provas.length-1].date : sorted[sorted.length-1].date;
  return { records: sorted, dataAlvo };
}

function parseCiclo(text) {
  const { header, rows } = parseCSVText(text);
  const { records, missingColumns } = buildRecords(header, rows);
  if (missingColumns.length) return { ok:false, error:"CSV inválido: faltam as colunas obrigatórias (" + missingColumns.join(", ") + ")." };
  if (records.length === 0) return { ok:false, error:"CSV inválido: nenhuma linha com dados válidos foi encontrada." };
  const { records: treinos, dataAlvo } = deriveWeeksAndTarget(records);
  return { ok:true, treinos, dataAlvo };
}

let tab = "semana";
let expanded = {};

// --- Estado do ciclo, hora de término e nome do evento ---
let horaTermino  = "08:00";
let nomeEvento   = "";
let dataAlvo     = null;
let cicloCarregado = false;
let errorMsg     = null;
let pendingCiclo = null;   // {treinos, dataAlvo} aguardando confirmação do formulário
let showForm     = false;
let formDefaults = {horaTermino:"08:00", nomeEvento:""};

const STORAGE_KEY = "srcCiclo";

function computeDataAlvo(treinos) {
  if (!treinos.length) return null;
  const provas = treinos.filter(t => t.prova);
  const pool = provas.length ? provas : treinos;
  return pool.reduce((a,b) => a.date > b.date ? a : b).date;
}

function salvarCiclo() {
  const data = { versao:1, horaTermino, nomeEvento, carregadoEm: new Date().toISOString(), treinos: S };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function carregarCicloSalvo() {
  let raw;
  try { raw = localStorage.getItem(STORAGE_KEY); } catch(e) { return false; }
  if (!raw) return false;
  try {
    const data = JSON.parse(raw);
    if (!data || !Array.isArray(data.treinos) || data.treinos.length === 0) return false;
    S = data.treinos;
    horaTermino = data.horaTermino || "08:00";
    nomeEvento  = data.nomeEvento || "";
    dataAlvo    = computeDataAlvo(S);
    return true;
  } catch(e) { return false; }
}

function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function tomorrow() {
  const d = new Date(); d.setDate(d.getDate()+1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function getHero() {
  const tmr = tomorrow();
  const ts = S.find(s => s.date === tmr);
  if(ts && !isOffTipo(ts.tipo)) return ts;
  return S.find(s => s.date > today());
}

// --- Fluxo de carregar/atualizar ciclo ---
function abrirSeletorArquivo() {
  document.getElementById("file-input").click();
}

function onArquivoSelecionado(e) {
  const file = e.target.files[0];
  e.target.value = "";
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const result = parseCiclo(String(reader.result));
    if (!result.ok) {
      errorMsg = result.error;
      render();
      return;
    }
    errorMsg = null;
    pendingCiclo = result;
    formDefaults = { horaTermino: horaTermino || "08:00", nomeEvento: nomeEvento || "" };
    showForm = true;
    render();
  };
  reader.onerror = () => {
    errorMsg = "Não foi possível ler o arquivo selecionado.";
    render();
  };
  reader.readAsText(file);
}

function confirmarCiclo() {
  const htInput = document.getElementById("form-hora").value;
  const neInput = document.getElementById("form-evento").value.trim();
  if (!htInput) return;
  S = pendingCiclo.treinos;
  dataAlvo = pendingCiclo.dataAlvo;
  horaTermino = htInput;
  nomeEvento = neInput;
  cicloCarregado = true;
  pendingCiclo = null;
  showForm = false;
  tab = "semana";
  expanded = {};
  salvarCiclo();
  render();
}

function setTab(t) { tab=t; render(); }
function togAcc(w) {
  const cw  = getHero()?.w ?? S[S.length-1]?.w;
  const cur = expanded.hasOwnProperty(w) ? expanded[w] : w === cw;
  expanded[w] = !cur;
  render();
}

function render() {
  const td = today();
  const tmr = tomorrow();

  if (!cicloCarregado) {
    let html = `<div class="hdr"><div><div class="hdr-sub">Sistema Ritmo Certo</div></div></div>`;
    if (errorMsg) html += `<div class="error-banner">${errorMsg}</div>`;
    html += `
  <div class="empty-state">
    <p>Nenhum ciclo carregado ainda.</p>
    <div class="ciclo-btn-wrap"><button class="ciclo-btn" onclick="abrirSeletorArquivo()">Carregar ciclo</button></div>
  </div>
  <div class="footer">Foco · Consistência · Execução</div>`;
    document.getElementById("app").innerHTML = html;
    if (showForm) renderFormOverlay(); else removeFormOverlay();
    return;
  }

  const hero  = getHero();
  const semanaDerivavel = S.length > 0 && S[0].w !== undefined;
  const cw    = hero ? hero.w : (semanaDerivavel ? S[S.length-1].w : undefined);
  const ws    = semanaDerivavel ? S.filter(s => s.w === cw) : [];
  const dl    = dataAlvo ? Math.max(0, Math.ceil((new Date(dataAlvo) - new Date(td)) / 86400000)) : 0;
  const byW   = semanaDerivavel ? S.reduce((a,s) => ({...a,[s.w]:[...(a[s.w]||[]),s]}),{}) : {};
  const isOpen= w => expanded.hasOwnProperty(w) ? expanded[w] : w===cw;

  const heroSt = hero ? sc(hero.tipo, hero.prova) : {text:"#FB923C",bar:"#FB923C",bg:"transparent"};
  const weekLabel = w => w !== undefined ? `Semana ${w}` : "Semana não disponível";

  let html = `
  <div class="hdr">
    <div>
      <div class="hdr-sub">Sistema Ritmo Certo</div>
      <div class="hdr-desc">${nomeEvento ? nomeEvento + " · " : ""}${dataAlvo ? fmtLonga(dataAlvo) : ""}</div>
    </div>
    <div class="hdr-right">
      <div class="hdr-label">faltam</div>
      <div class="hdr-days">${dl}<span> d</span></div>
    </div>
  </div>`;

  if (errorMsg) html += `<div class="error-banner">${errorMsg}</div>`;

  if(hero) {
    const isAmanha = hero.date === tmr;
    html += `
  <div class="hero">
    <div class="hero-bar" style="background:linear-gradient(90deg,${heroSt.bar},transparent)"></div>
    <div class="hero-body">
      <div class="hero-row">
        <div>
          <div class="hero-eyebrow">${isAmanha ? "Amanhã" : "Próximo treino"}</div>
          <div class="hero-meta">${hero.dia} ${fmt(hero.date)} · <span>${weekLabel(hero.w)}</span></div>
        </div>
        <div class="hero-badge" style="background:${heroSt.bg};border:1px solid ${heroSt.bar}40;color:${heroSt.text}">${hero.tipo}</div>
      </div>
      <div class="hero-center">
        <div class="hero-wake-label">Despertar</div>
        ${hero.prova
          ? `<div class="hero-prova">🏁 DIA DE PROVA</div>`
          : hero.dur === null
          ? `<div class="hero-time" style="font-size:48px">—</div>`
          : `<div class="hero-time">${wt(hero.dur)}</div>
             <div class="hero-info">
               <span>⏱ <b>${hero.dur} min</b></span>
               <span class="hero-dot">·</span>
               <span>RPE <b>${hero.rpe}</b></span>
               <span class="hero-dot">·</span>
               <span>término <b>~${horaTermino}</b></span>
             </div>`
        }
      </div>
    </div>
  </div>`;
  }

  html += `
  <div class="ciclo-btn-wrap"><button class="ciclo-btn" onclick="abrirSeletorArquivo()">Atualizar ciclo</button></div>
  <div class="tabs">
    <button class="tab ${tab==="semana"?"active":"inactive"}" onclick="setTab('semana')">Esta Semana</button>
    <button class="tab ${tab==="ciclo"?"active":"inactive"}" onclick="setTab('ciclo')">Ciclo Completo</button>
  </div>`;

  if(tab==="semana") {
    html += `<div class="sec-label">${weekLabel(cw)}</div>`;
    ws.forEach(s => {
      const isT  = s.date === td;
      const past = s.date < td;
      const st   = sc(s.tipo, s.prova);
      const isOff= isOffTipo(s.tipo);
      html += `
  <div class="day-row${isT?" today":""}${past?" past":""}">
    <div style="width:40px;flex-shrink:0">
      <div class="day-name ${isT?"today":"normal"}">${s.dia}</div>
      <div class="day-date">${fmt(s.date)}</div>
    </div>
    <div class="day-bar" style="background:${isOff?"#1C3A52":st.bar}"></div>
    <div style="flex:1">
      <div class="day-tipo${isOff?" off":""}" style="${isOff?"":"color:"+st.text}">${s.tipo}</div>
      ${s.dur>0?`<div class="day-dur">${s.dur} min · RPE ${s.rpe}</div>`:""}
    </div>
    <div class="day-wake">
      ${isOff
        ? `<span class="day-wake-off">descanso</span>`
        : s.prova
        ? `<span class="day-wake-prova">PROVA</span>`
        : s.dur === null
        ? `<span class="day-wake-off">—</span>`
        : `<span class="day-wake-time">${wt(s.dur)}</span>`
      }
    </div>
  </div>`;
    });
  }

  if(tab==="ciclo") {
    if (!semanaDerivavel) {
      const days = S.filter(s => !isOffTipo(s.tipo));
      html += `<div class="acc-body" style="margin:0 14px 6px;border-radius:10px">`;
      days.forEach(s => {
        const past = s.date < td;
        const isT  = s.date === td;
        const st   = sc(s.tipo, s.prova);
        html += `
    <div class="acc-item${isT?" today-row":""}" style="opacity:${past?.32:1}">
      <div class="acc-date">${s.dia} ${fmt(s.date)}</div>
      <div style="flex:1;padding-left:4px">
        <span class="acc-tipo" style="color:${st.text}">${s.tipo}</span>
        ${s.dur>0?`<span class="acc-dur">${s.dur}' RPE${s.rpe}</span>`:""}
      </div>
      <div>${s.prova
        ? `<span class="acc-wake prova">🏁</span>`
        : s.dur === null
        ? `<span class="acc-wake" style="font-size:12px;color:#3D6482">—</span>`
        : `<span class="acc-wake">${wt(s.dur)}</span>`
      }</div>
    </div>`;
      });
      html += `</div>`;
    } else {
      Object.keys(byW).forEach(wk => {
        const wn   = parseInt(wk);
        const open = isOpen(wn);
        const cur  = wn===cw;
        const days = byW[wk].filter(s=>!isOffTipo(s.tipo));
        html += `
  <div style="margin:0 14px 6px">
    <button class="acc-btn ${cur?"cur":"nor"} ${open?"open":"closed"}" onclick="togAcc(${wn})">
      ${weekLabel(wn)}<span class="acc-arrow">${open?"▲":"▼"}</span>
    </button>`;
        if(open) {
          html += `<div class="acc-body">`;
          days.forEach((s,i) => {
            const past = s.date < td;
            const isT  = s.date === td;
            const st   = sc(s.tipo, s.prova);
            html += `
    <div class="acc-item${isT?" today-row":""}" style="opacity:${past?.32:1}">
      <div class="acc-date">${s.dia} ${fmt(s.date)}</div>
      <div style="flex:1;padding-left:4px">
        <span class="acc-tipo" style="color:${st.text}">${s.tipo}</span>
        ${s.dur>0?`<span class="acc-dur">${s.dur}' RPE${s.rpe}</span>`:""}
      </div>
      <div>${s.prova
        ? `<span class="acc-wake prova">🏁</span>`
        : s.dur === null
        ? `<span class="acc-wake" style="font-size:12px;color:#3D6482">—</span>`
        : `<span class="acc-wake">${wt(s.dur)}</span>`
      }</div>
    </div>`;
          });
          html += `</div>`;
        }
        html += `</div>`;
      });
    }
  }

  html += `<div class="footer">Foco · Consistência · Execução</div>`;
  document.getElementById("app").innerHTML = html;

  if (showForm) renderFormOverlay(); else removeFormOverlay();
}

function removeFormOverlay() {
  const existing = document.getElementById("form-overlay");
  if (existing) existing.remove();
}

function renderFormOverlay() {
  removeFormOverlay();
  const overlay = document.createElement("div");
  overlay.className = "form-overlay";
  overlay.id = "form-overlay";
  overlay.innerHTML = `
    <div class="form-card">
      <h3>Confirmar ciclo</h3>
      <div class="form-field">
        <label for="form-hora">Hora de término do treino</label>
        <input type="time" id="form-hora" value="${formDefaults.horaTermino}" required/>
      </div>
      <div class="form-field">
        <label for="form-evento">Nome do evento (opcional)</label>
        <input type="text" id="form-evento" value="${formDefaults.nomeEvento}" placeholder="ex.: Meia Maratona de Buenos Aires"/>
      </div>
      <div class="form-actions">
        <button onclick="confirmarCiclo()">Confirmar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

cicloCarregado = carregarCicloSalvo();
render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js");
  });
}
</script>
</body>
</html>
